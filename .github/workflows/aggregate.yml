name: Aggregate HGTFS

# Rebuild the aggregated feed when the descriptor or a vendored source changes,
# weekly to pick up upstream changes in remote sources, or on demand.
on:
  push:
    paths:
      - "sources.json"
      - "sources/**"
      - "aggregate.py"
      - ".github/workflows/aggregate.yml"
  schedule:
    - cron: "0 4 * * 1"     # Mondays 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aggregate
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # purge the sources on jsDelivr first, so the rebuild fetches fresh inputs
      # instead of jsDelivr's cached (hours-old) copies.
      - name: Purge source feeds on jsDelivr
        run: python3 purge_jsdelivr.py sources sources.json

      - name: Build aggregate feed
        run: python3 aggregate.py

      - name: Commit refreshed feed if it changed
        id: commit
        run: |
          git config user.name "hgtfs-aggregate-bot"
          git config user.email "actions@users.noreply.github.com"
          git add hgtfs hgtfs.zip
          if git diff --cached --quiet; then
            echo "Aggregate unchanged."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Rebuild aggregate feed [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # when the output changed, purge it on jsDelivr so the viewer loads the
      # new data immediately instead of the previously-cached aggregate.
      - name: Purge aggregate on jsDelivr
        if: steps.commit.outputs.changed == 'true'
        run: python3 purge_jsdelivr.py self "${{ github.repository }}" "${{ github.ref_name }}"
